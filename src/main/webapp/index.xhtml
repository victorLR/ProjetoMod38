<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>Cadastro de Clientes</title>
</h:head>
<h:body>
    <h2>Cadastro de Clientes</h2>

    <h:messages globalOnly="true" />

    <h:form>
        <h:panelGrid columns="2" cellpadding="6">
            <h:outputLabel for="nome" value="Nome:" />
            <h:inputText id="nome" value="#{clienteController.cliente.nome}" required="true" />

            <h:outputLabel for="email" value="E-mail:" />
            <h:inputText id="email" value="#{clienteController.cliente.email}" required="true" />

            <h:outputLabel for="telefone" value="Telefone:" />
            <h:inputText id="telefone" value="#{clienteController.cliente.telefone}" required="true" />
        </h:panelGrid>

        <h:commandButton value="Cadastrar" action="#{clienteController.salvar}">
            <f:ajax execute="@form" render="@form tabela mensagens" />
        </h:commandButton>

        <h:panelGroup id="mensagens">
            <h:messages globalOnly="true" />
        </h:panelGroup>

        <h:panelGroup id="tabela" layout="block" style="margin-top:20px;">
            <h:dataTable value="#{clienteController.clientes}" var="item" border="1"
                         rendered="#{not empty clienteController.clientes}">
                <h:column>
                    <f:facet name="header">ID</f:facet>
                    #{item.id}
                </h:column>
                <h:column>
                    <f:facet name="header">Nome</f:facet>
                    #{item.nome}
                </h:column>
                <h:column>
                    <f:facet name="header">E-mail</f:facet>
                    #{item.email}
                </h:column>
                <h:column>
                    <f:facet name="header">Telefone</f:facet>
                    #{item.telefone}
                </h:column>
            </h:dataTable>
        </h:panelGroup>
    </h:form>
</h:body>
</html>
